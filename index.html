<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>한백인 맛집 지도</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const SHEET_ID = '1uFWmONrQqv6mVuNWrVV8Les3ynS6aYWVNtDEbxIlHBU';
    const API_KEY = 'AIzaSyBUTqpAUGU-D7Ns5s5-Srhc3qaaW0vB9zA';

    let map;
    let geocoder;

    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        zoom: 14,
        center: { lat: 35.2198432, lng: 126.822408 }
      });
      geocoder = new google.maps.Geocoder();
      loadSheetData();
    }

    function loadSheetData() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      fetch(url)
        .then(res => res.text())
        .then(text => {
          const json = JSON.parse(text.substring(47).slice(0, -2));
          const rows = json.table.rows;
          rows.forEach(row => {
            const name = row.c[0]?.v;
            const address = row.c[1]?.v;
            const menu = row.c[2]?.v;
            const rating = row.c[3]?.v;
            const review = row.c[4]?.v;
            if (name && address) {
              addMarker(name, address, menu, rating, review);
            }
          });
        })
        .catch(err => console.error('시트 데이터 로드 실패:', err));
    }

    function addMarker(name, address, menu, rating, review) {
      geocoder.geocode({ address: address }, function(results, status) {
        if (status === 'OK') {
          const marker = new google.maps.Marker({
            map: map,
            position: results[0].geometry.location,
            title: name
          });

          const content = `
            <div style="font-family: sans-serif; min-width: 150px;">
              <strong style="font-size: 14px;">${name}</strong><br>
              ${menu ? `<span>🍽 ${menu}</span><br>` : ''}
              ${rating ? `<span>⭐ ${rating}점</span><br>` : ''}
              ${review ? `<span style="color: #555; font-size: 12px;">${review}</span>` : ''}
            </div>
          `;

          const infoWindow = new google.maps.InfoWindow({ content });

          marker.addListener('click', () => {
            infoWindow.open(map, marker);
          });
        }
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBUTqpAUGU-D7Ns5s5-Srhc3qaaW0vB9zA&callback=initMap" async defer></script>
</body>
</html>
